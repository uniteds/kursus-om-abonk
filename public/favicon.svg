    <circle cx="12" cy="7.5" r="1.5" fill="#fbbf24" stroke="#fbbf24"/>
    <!-- Base / body -->
    <path d="M-10,1 L-10,10 C-10,14 10,14 10,10 L10,1" fill="rgba(255,255,255,.1)"/>
